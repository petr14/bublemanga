<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
  <meta name="theme-color" content="#667eea"/>
  <title>Топ читателей — BubbleManga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --accent: #667eea;
      --bg: #0a0a0a;
      --card: #1a1a1a;
      --card2: #141414;
      --border: rgba(255,255,255,.06);
      --text: #ffffff;
      --text-2: #b8b8b8;
      --text-3: #71717a;
    }
    html, body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased; line-height: 1.6;
    }
    a { color: inherit; }

    /* ── Шапка ─────────────────────────────────── */
    .site-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,10,.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .site-header-inner {
      max-width: 1400px; margin: 0 auto; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .site-logo {
      font-size: 20px; font-weight: 800; text-decoration: none; letter-spacing: -.5px;
      background: var(--primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      display: flex; align-items: center; gap: 7px;
    }
    .site-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-btn {
      padding: 8px 16px; background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1); border-radius: 50px;
      color: #fff; text-decoration: none; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; white-space: nowrap;
      transition: background .2s, transform .15s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .nav-btn:active { transform: scale(.95); }
    .nav-btn.active { background: var(--primary); border-color: transparent; }
    @media(min-width:1024px) {
      .nav-btn:hover { background: rgba(255,255,255,.09); }
      .nav-btn.active:hover { opacity: .88; }
    }

    /* ── Страница ───────────────────────────────── */
    .page-wrap { padding-top: 72px; }

    /* ── Hero ─────────────────────────────────────── */
    .top-hero {
      text-align: center; padding: 4rem 1rem 2.5rem;
      background: linear-gradient(135deg, #08081a 0%, #0f0c2a 50%, #10091e 100%);
      border-bottom: 1px solid var(--border);
    }
    .top-hero h1 {
      font-size: 2.5rem; font-weight: 800;
      background: var(--primary);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: .5rem;
    }
    .top-hero p { color: var(--text-2); font-size: .95rem; }

    /* ── Контейнер ─────────────────────────────── */
    .top-container { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

    /* ── Топ-3 карточки ─────────────────────────── */
    .top3-grid {
      display: grid;
      grid-template-columns: 1fr 1.12fr 1fr;
      gap: .75rem; margin-bottom: 2rem;
      align-items: end;
    }
    @media(max-width:560px) {
      .top3-grid { grid-template-columns: 1fr; align-items: stretch; }
      .top3-card.rank-1 { order: -1; }
    }

    .top3-card {
      border-radius: 18px; overflow: hidden;
      text-decoration: none; color: inherit;
      border: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: relative;
      transition: transform .15s, box-shadow .15s;
    }
    .top3-card.rank-1 { border-color: rgba(255,215,0,.55); box-shadow: 0 0 28px rgba(255,215,0,.18); }
    .top3-card.rank-2 { border-color: rgba(192,192,192,.35); }
    .top3-card.rank-3 { border-color: rgba(205,127,50,.5); box-shadow: 0 0 22px rgba(205,127,50,.15); }
    .top3-card:active { transform: scale(.97); }
    @media(min-width:1024px) { .top3-card:hover { transform: translateY(-3px); } }

    /* фоновый слой на всю карточку */
    .top3-bg-layer {
      position: absolute; inset: 0;
      z-index: 0;
    }
    img.top3-bg-layer, video.top3-bg-layer {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      transform: translateZ(0); display: block;
    }
    div.top3-bg-layer {
      background-size: cover; background-position: center center;
    }
    .top3-bg-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 0; transform: translateZ(0); display: block;
    }
    /* затемняющий градиент */
    .top3-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,.10) 0%,
        rgba(0,0,0,.35) 45%,
        rgba(0,0,0,.72) 100%);
      z-index: 1;
    }

    /* медаль — правый верхний угол */
    .top3-medal {
      position: absolute; top: 10px; right: 10px;
      display: flex; flex-direction: column; align-items: center;
      z-index: 3;
    }
    .top3-medal-circle {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 900; color: #fff;
      border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 2px 12px rgba(0,0,0,.55);
    }
    .top3-medal-ribbon {
      width: 14px; height: 11px; margin-top: -1px;
      clip-path: polygon(0 0, 100% 0, 82% 100%, 50% 72%, 18% 100%);
    }
    .top3-card.rank-1 .top3-medal-circle { background: linear-gradient(160deg,#ffe066,#f59e0b); }
    .top3-card.rank-1 .top3-medal-ribbon { background: linear-gradient(180deg,#f59e0b,#b45309); }
    .top3-card.rank-2 .top3-medal-circle { background: linear-gradient(160deg,#e2e8f0,#94a3b8); }
    .top3-card.rank-2 .top3-medal-ribbon { background: linear-gradient(180deg,#94a3b8,#64748b); }
    .top3-card.rank-3 .top3-medal-circle { background: linear-gradient(160deg,#fbbf80,#c2692a); }
    .top3-card.rank-3 .top3-medal-ribbon { background: linear-gradient(180deg,#c2692a,#7c3b10); }

    /* контент поверх фона */
    .top3-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; padding: 2.5rem .75rem .85rem;
    }
    .top3-card.rank-1 .top3-content { padding-top: 3.25rem; }

    .top3-av-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.35); overflow: hidden;
      background: linear-gradient(135deg,#667eea,#764ba2);
      flex-shrink: 0; margin-bottom: .6rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    .top3-card.rank-1 .top3-av-wrap { width: 88px; height: 88px; }
    .top3-av-wrap img, .top3-av-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .av-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140%; height: 140%;
      pointer-events: none; z-index: 2; object-fit: contain;
    }
    .lb-av-frame {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 160%; height: 160%;
      pointer-events: none; z-index: 2; object-fit: contain;
    }

    .top3-body { width: 100%; text-align: center; }
    .top3-name {
      font-size: .85rem; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: .35rem;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    .top3-level {
      display: inline-flex; align-items: center; gap: .25rem;
      background: var(--primary); border-radius: 20px;
      padding: .2rem .65rem; font-size: .72rem; font-weight: 700; color: #fff;
      margin-bottom: .6rem; line-height: 1.4;
    }
    .top3-level-num {
      background: rgba(0,0,0,.22); border-radius: 10px;
      padding: .05rem .3rem; font-size: .7rem; line-height: 1.3;
    }
    .top3-stats {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      background: var(--card2); border-top: 1px solid var(--border);
      margin: 0 -.75rem -.85rem;
      padding: .6rem .75rem .7rem;
    }
    .top3-stat { text-align: center; }
    .top3-stat + .top3-stat { border-left: 1px solid var(--border); }
    .top3-stat-lbl { font-size: .58rem; color: var(--text-3); line-height: 1.3; margin-bottom: .15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top3-stat-val { font-size: .82rem; font-weight: 700; color: #fff; line-height: 1.2; }

    /* ── Таблица ───────────────────────────────── */
    .leaderboard {
      background: var(--card2); border-radius: 16px;
      border: 1px solid var(--border); overflow: hidden;
    }
    /* grid: rank | avatar | name | level | xp */
    .lb-row {
      display: grid;
      grid-template-columns: 36px 40px 1fr 56px 64px;
      align-items: center; gap: .75rem;
      padding: .85rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .15s; text-decoration: none; color: inherit;
      content-visibility: auto;
      contain-intrinsic-height: 70px;
    }
    /* + chapters column on wider screens */
    @media(min-width:500px) {
      .lb-row { grid-template-columns: 36px 40px 1fr 56px 56px 64px; }
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--card); }
    .lb-row.me { background: rgba(102,126,234,.08); }

    /* Разделитель перед строкой текущего пользователя вне топ-100 */
    .lb-my-sep {
      position: relative; height: 1px;
      background: rgba(255,255,255,.07); margin: 0;
    }
    .lb-my-sep::before {
      content: '· · ·';
      position: absolute; left: 50%; transform: translateX(-50%) translateY(-50%);
      background: var(--card2); padding: 0 10px;
      color: rgba(255,255,255,.2); font-size: .7rem; letter-spacing: .15em;
    }

    .lb-rank {
      text-align: center; font-weight: 700; font-size: 1rem;
      color: var(--text-3);
    }
    .lb-rank.top3 { color: #FFD700; }

    .lb-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; overflow: hidden;
    }
    .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .lb-name {
      font-weight: 600; font-size: .9rem; color: #d4d4d8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lb-level {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: .2rem .5rem;
      font-size: .75rem; font-weight: 700; color: var(--accent);
      line-height: 1; text-align: center; justify-self: center;
    }
    .lb-xp { text-align: right; }
    .lb-xp-val { font-weight: 700; font-size: .9rem; color: #fff; }
    .lb-xp-label { font-size: .7rem; color: var(--text-3); }

    .lb-chapters { text-align: right; display: none; }
    @media(min-width:500px) { .lb-chapters { display: block; } }
    .lb-chapters-val { font-weight: 600; font-size: .85rem; color: var(--text-2); }
    .lb-chapters-label { font-size: .7rem; color: var(--text-3); }

    .lb-premium-crown {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      font-size: 10px; line-height: 1; margin-left: .35rem;
      box-shadow: 0 0 6px rgba(251,191,36,.5);
      vertical-align: middle;
    }
  </style>
</head>
<body>

{% set g_active = 'top' %}{% include 'header.html' %}

<div class="page-wrap">
  <div id="top-root"></div>
</div>

<script type="importmap">

<script type="module">
import React from 'react';
import {createRoot} from 'react-dom/client';
const {createElement:h,Fragment} = React;

const LEADERS      = {{ leaders | tojson }};
const MY_ID        = {{ user_id | tojson }};
const MY_RANK_DATA = {{ my_rank_data | tojson }};
const TOTAL_USERS  = {{ total_users | tojson }};

// Возвращает URL миниатюры нужной ширины (только для /static/uploads/)
function thumb(url, w) {
  if (!url || !url.startsWith('/static/uploads/')) return url;
  return `/thumb?src=${encodeURIComponent(url)}&w=${w}`;
}

// Является ли файл анимированным (GIF или WebP)
function isAnimated(url) {
  if (!url) return false;
  const ext = url.split('?')[0].split('.').pop().toLowerCase();
  return ext === 'gif' || ext === 'webp';
}

// URL для предварительно сгенерированного WebM (хранится рядом с оригиналом)
function animUrl(url) {
  if (!url || !url.startsWith('/static/uploads/')) return url;
  return url + '.webm';
}

// Рендерит изображение или видео в зависимости от типа контента
// <video> — только для /static/uploads/ (не frames/) файлов с .webm
// Рамки (frames) всегда <img> — WebM не поддерживает прозрачность в нашей конвертации
function Media({url, w, style, className, forceImg=false}) {
  const s = style || {width:'100%', height:'100%', objectFit:'cover', display:'block'};
  const isLocalUpload = url && url.startsWith('/static/uploads/');
  const isFrame = url && url.includes('/uploads/frames/');
  if (!forceImg && isLocalUpload && !isFrame && isAnimated(url)) {
    return h('video', {autoPlay:true, loop:true, muted:true, playsInline:true, style:s, className},
      h('source', {src: animUrl(url), type:'video/webm'}),
      h('source', {src: url})
    );
  }
  const imgSrc = isLocalUpload ? thumb(url, w) : url;
  return h('img', {src: imgSrc, style:s, alt:'', className});
}

function Av({url, frameUrl, size=40, fontSize='1rem'}){
  const s = {
    width:size, height:size, borderRadius:'50%',
    background:'linear-gradient(135deg,#667eea,#764ba2)',
    display:'flex', alignItems:'center', justifyContent:'center',
    fontSize, flexShrink:0, overflow:'hidden',
    position:'relative'
  };
  return h('div',{style:s},
    url ? h(Media, {url, w:80, style:{width:'100%',height:'100%',objectFit:'cover'}}) : '',
    frameUrl ? h(Media, {url:frameUrl, w:80, style:{
      position:'absolute', top:'50%', left:'50%',
      transform:'translate(-50%,-50%)',
      width:'160%', height:'160%',
      pointerEvents:'none', zIndex:2, objectFit:'contain'
    }}) : null
  );
}

function TopThree(){
  const top3 = LEADERS.slice(0,3);
  if(!top3.length) return null;
  // отображаем: 2-й, 1-й, 3-й
  const order = top3.length >= 3 ? [top3[1],top3[0],top3[2]] : top3;
  const ranks = top3.length >= 3 ? [2,1,3] : [1,2,3].slice(0,top3.length);

  return h('div',{className:'top3-grid'},
    order.map((u,i)=>{
      const rank = ranks[i];
      const name = (u.custom_name||'').trim()||(u.telegram_first_name||'').trim()||(u.telegram_username||'').trim()||`#${u.id}`;
      const betterThan = Math.round((TOTAL_USERS - rank) / TOTAL_USERS * 100);
      const betterThanVal = TOTAL_USERS > 1
        ? ((TOTAL_USERS - rank) / TOTAL_USERS * 100).toFixed(1) + '%'
        : '—';
      const bgLayer = u.background_url
        ? h(Media, {url:u.background_url, w:600, className:'top3-bg-layer'})
        : h('div',{className:'top3-bg-layer',style:{background:'linear-gradient(135deg,#0d0d2b 0%,#1a1040 100%)'}});
      return h('a',{key:u.id, className:`top3-card rank-${rank}`, href:`/profile/${u.id}`},
        bgLayer,
        h('div',{className:'top3-medal'},
          h('div',{className:'top3-medal-circle'}, rank),
          h('div',{className:'top3-medal-ribbon'})
        ),
        h('div',{className:'top3-content'},
          h('div',{className:'top3-av-wrap', style:{position:'relative', overflow:'visible'}},
            u.avatar_url ? h(Media, {url:u.avatar_url, w:176, style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%'}}) : '',
            u.frame_preview_url ? h(Media, {url:u.frame_preview_url, w:176, style:{
              position:'absolute', top:'50%', left:'50%',
              transform:'translate(-50%,-50%)',
              width:'150%', height:'150%',
              pointerEvents:'none', zIndex:2, objectFit:'contain'
            }}) : null
          ),
          h('div',{className:'top3-body'},
            h('div',{className:'top3-name'}, name),
            h('div',{className:'top3-level'},
              h('span',{className:'top3-level-num'}, u.level||1),
              'Уровень'
            ),
            h('div',{className:'top3-stats'},
              h('div',{className:'top3-stat'},
                h('div',{className:'top3-stat-lbl'}, 'Прочитал глав'),
                h('div',{className:'top3-stat-val'}, (u.total_chapters_read||0).toLocaleString())
              ),
              h('div',{className:'top3-stat'},
                h('div',{className:'top3-stat-lbl'}, 'Лучше чем'),
                h('div',{className:'top3-stat-val'}, betterThanVal)
              ),
              h('div',{className:'top3-stat'},
                h('div',{className:'top3-stat-lbl'}, 'XP'),
                h('div',{className:'top3-stat-val'}, (u.xp||0).toLocaleString())
              )
            )
          )
        )
      );
    })
  );
}

function LbRow({u, rank}){
  const name = (u.custom_name||'').trim()||(u.telegram_first_name||'').trim()||(u.telegram_username||'').trim()||`Пользователь #${u.id}`;
  const isMe = u.id === MY_ID;
  return h('a',{className:`lb-row${isMe?' me':''}`, href:`/profile/${u.id}`},
    h('div',{className:`lb-rank${rank<=3?' top3':''}`},
      rank
    ),
    h('div',{className:'lb-avatar'}, h(Av,{url:u.avatar_url,frameUrl:u.frame_preview_url,size:40})),
    h('div',{className:'lb-name'},
      name,
      !!u.is_premium && h('span',{className:'lb-premium-crown',title:'Premium'},'👑'),
      isMe && h('span',{style:{marginLeft:'.4rem',color:'#667eea',fontSize:'.75rem'}},'(вы)')
    ),
    h('div',{className:'lb-level'}, `Lv.${u.level||1}`),
    h('div',{className:'lb-chapters'},
      h('div',{className:'lb-chapters-val'}, u.total_chapters_read||0),
      h('div',{className:'lb-chapters-label'}, 'глав')
    ),
    h('div',{className:'lb-xp'},
      h('div',{className:'lb-xp-val'}, (u.xp||0).toLocaleString()),
      h('div',{className:'lb-xp-label'}, 'XP')
    )
  );
}

function TopPage(){
  const rest = LEADERS.slice(3);
  return h(Fragment,null,
    h('div',{className:'top-hero'},
      h('h1',null,'Топ читателей'),
      h('p',null,'Читай больше — зарабатывай XP — попади в топ')
    ),
    h('div',{className:'top-container'},
      h(TopThree),
      LEADERS.length === 0
        ? h('p',{style:{textAlign:'center',color:'#71717a',padding:'2rem'}},
            'Пока никого нет. Будь первым!')
        : rest.length > 0 && h('div',{className:'leaderboard'},
            rest.map((u,i)=>h(LbRow,{key:u.id,u,rank:i+4})),
            MY_RANK_DATA && h(Fragment,null,
              h('div',{className:'lb-my-sep'}),
              h(LbRow,{key:'my-pos',u:MY_RANK_DATA,rank:MY_RANK_DATA.rank})
            )
          )
    )
  );
}

createRoot(document.getElementById('top-root')).render(h(TopPage));


// Останавливаем анимацию у элементов вне экрана
const mediaObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const el = entry.target;
    if (el.tagName === 'VIDEO') {
      if (entry.isIntersecting) { el.play().catch(()=>{}); }
      else { el.pause(); }
    }
  });
}, { rootMargin: '200px' });

setTimeout(() => {
  document.querySelectorAll('.lb-avatar video').forEach(v => mediaObserver.observe(v));
}, 50);
</script>
